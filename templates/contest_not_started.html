{% extends "base.html" %}

{% block title %}Contest Not Started{% endblock %}

{% block content %}
<div class="card" style="text-align: center; padding: 3rem;">
    <h2>🕐 Contest Not Started</h2>
    <p style="font-size: 1.2em; margin: 2rem 0;">
        The coding contest has not been started by your instructor yet.
    </p>
    <p style="color: #ffc107;">
        Please wait for your instructor to begin the contest, then refresh this page.
    </p>
    <div style="margin-top: 2rem;">
        <button onclick="location.reload()" class="btn">
            🔄 Refresh Page
        </button>
        <a href="{{ url_for('logout') }}" class="btn" style="margin-left: 1rem; background: #6c757d;">
            Logout
        </a>
    </div>
</div>

<script>
// Auto-refresh every 30 seconds
setTimeout(function() {
    location.reload();
}, 30000);
</script>
{% endblock %}
